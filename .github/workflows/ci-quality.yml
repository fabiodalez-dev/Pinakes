name: Code Quality

on:
  push:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - '.github/workflows/ci-quality.yml'
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: PHP Lint · PHPStan · Composer Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring, json, curl, openssl, zip
          tools: phpstan, composer
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP syntax check
        run: |
          set -o pipefail
          echo "Checking PHP syntax..."
          PHP_DIRS=$(printf '%s\n' app/ config/ public/ installer/ server/ storage/plugins/ | while read -r dir; do
            [ -d "$dir" ] && printf '%s\n' "$dir"
          done)
          ERRORS=$(find $PHP_DIRS -name '*.php' \
            ! -path '*/vendor/*' \
            | xargs -P4 -n1 php -l 2>&1 \
            | grep -E "Parse error|Fatal error" || true)
          if [ -n "$ERRORS" ]; then
            echo "$ERRORS"
            exit 1
          fi
          echo "✓ No syntax errors"

      - name: PHPStan static analysis (level 5)
        run: phpstan analyse --configuration phpstan.neon --memory-limit=512M --no-progress

      - name: Composer security audit
        run: composer audit --abandoned=report
